name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Устанавливаем принудительно конкретные версии
        pip install PyQt6==6.6.1 PyQt6-Qt6==6.6.1 PyQt6-sip==13.6.0
        pip install pytest pytest-qt pytest-cov cryptography pycryptodome argon2-cffi pyperclip python-dotenv

    - name: Install Qt dependencies (Linux)
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libxcb-cursor0 \
          libxkbcommon-x11-0 \
          libxcb-icccm4 \
          libxcb-image0 \
          libxcb-keysyms1 \
          libxcb-render-util0 \
          libxcb-xinerama0 \
          libxcb-xinput0 \
          libxcb-shape0 \
          libegl1 \
          libgl1 \
          libdbus-1-3 \
          libx11-xcb1 \
          libxcb-util1 \
          xvfb

    - name: Run tests with xvfb
      run: |
        # Помогаем системе найти библиотеки внутри site-packages
        export LD_LIBRARY_PATH=$(python -c "import site; print(site.getsitepackages()[0])")/PyQt6/Qt6/lib:$LD_LIBRARY_PATH
        export QT_QPA_PLATFORM=xcb
        xvfb-run --auto-servernum pytest