name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5 # Обновил до v5 (более стабильная)
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Устанавливаем зависимости. Версии PyQt6 лучше оставить гибкими или последними стабильными
        pip install PyQt6 PyQt6-Qt6 PyQt6-sip
        pip install pytest pytest-qt pytest-cov cryptography pycryptodome argon2-cffi pyperclip python-dotenv

    - name: Install Qt dependencies (Linux)
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libxcb-cursor0 \
          libxkbcommon-x11-0 \
          libxcb-icccm4 \
          libxcb-image0 \
          libxcb-keysyms1 \
          libxcb-render-util0 \
          libxcb-xinerama0 \
          libxcb-xinput0 \
          libxcb-shape0 \
          libegl1 \
          libgl1 \
          libdbus-1-3 \
          libx11-xcb1 \
          libxcb-util1 \
          xvfb \
          libasound2 # Добавил, часто требуется для Qt мультимедиа

    - name: Run tests with xvfb
      env:
        # Указываем Qt использовать виртуальный буфер кадра
        QT_QPA_PLATFORM: xcb
        # Отключаем захват клавиатуры, чтобы xvfb не конфликтовал с окружением
        QT_QPA_FB_DISABLE_KEYBOARD: 1
      run: |
        # Используем xvfb-run для запуска pytest в виртуальном дисплее
        xvfb-run --auto-servernum --server-args="-screen 0 1024x768x24" pytest --cov=src --cov-report=xml

    - name: Upload coverage to Codecov (optional)
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false