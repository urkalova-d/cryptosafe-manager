name: Cross-Platform Clipboard Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ['3.9', '3.11']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-qt PyQt6
        # Установите остальные зависимости вашего проекта, если есть requirements.txt
        # pip install -r requirements.txt

    - name: Install Linux Dependencies (for PyQt6/clipboard)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb libxcb-xinerama0 libxcb-cursor0
        # Запуск тестов с виртуальным дисплеем
      shell: bash

    - name: Run Tests with pytest
      # На Linux нужен xvfb-run для GUI тестов
      run: |
        if [ "$RUNNER_OS" == "Linux" ]; then
          xvfb-run -a pytest tests/test_clipboard_security.py -v
        else
          pytest tests/test_clipboard_security.py -v
        fi
      shell: bash